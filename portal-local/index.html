<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Portal Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,600;1,300&family=Unbounded:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f0e8;
      --surface: #ede8df;
      --surface2: #e4ddd2;
      --border: #c8bfad;
      --border2: #b0a592;
      --accent: #c0392b;
      --accent2: #e67e22;
      --ink: #1a1714;
      --ink2: #4a4540;
      --muted: #8a7f74;
      --card-bg: #faf7f2;
      --card-shadow: rgba(90,70,50,0.12);
      --scan-line: rgba(0,0,0,0.03);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      position: relative;
    }

    /* Paper texture via repeating lines */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 27px,
        var(--scan-line) 27px,
        var(--scan-line) 28px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* Noise overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== HEADER ===== */
    header {
      position: relative;
      z-index: 10;
      border-bottom: 3px solid var(--ink);
      padding: 0;
    }

    .header-top {
      background: var(--ink);
      color: var(--bg);
      padding: 0.4rem 2rem;
      font-size: 0.68rem;
      letter-spacing: 0.2em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-main {
      padding: 2rem 2rem 1.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
      max-width: 1280px;
      margin: 0 auto;
    }

    .logo h1 {
      font-family: 'Unbounded', sans-serif;
      font-size: clamp(1.8rem, 4vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.95;
      color: var(--ink);
    }

    .logo h1 span {
      color: var(--accent);
    }

    .logo .subtitle {
      margin-top: 0.6rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .version-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      border: 1.5px solid var(--ink);
      padding: 0.3rem 0.8rem;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
    }

    /* ===== DROP ZONE ===== */
    .drop-section {
      position: relative;
      z-index: 10;
      max-width: 1280px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .drop-zone {
      border: 2.5px dashed var(--border2);
      border-radius: 2px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s ease;
      background: var(--card-bg);
      position: relative;
      overflow: hidden;
    }

    .drop-zone::before {
      content: '';
      position: absolute;
      inset: 6px;
      border: 1px solid var(--border);
      pointer-events: none;
    }

    .drop-zone.drag-over {
      border-color: var(--accent);
      background: #fff8f6;
      transform: scale(1.005);
    }

    .drop-zone.drag-over::before {
      border-color: var(--accent);
    }

    .drop-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      display: block;
      opacity: 0.5;
    }

    .drop-zone h2 {
      font-family: 'Unbounded', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.5rem;
    }

    .drop-zone p {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.7;
    }

    .drop-or {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
      color: var(--muted);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
    }

    .drop-or::before, .drop-or::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* File input button */
    .file-btn-wrap {
      display: inline-block;
      position: relative;
    }

    .file-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--ink);
      color: var(--bg);
      font-family: 'Unbounded', sans-serif;
      font-weight: 700;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 0.75rem 1.75rem;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
      text-transform: uppercase;
    }

    .file-btn:hover { background: var(--accent); }

    #folderInput {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    /* ===== PROGRESS ===== */
    .progress-wrap {
      display: none;
      margin-top: 1.5rem;
    }

    .progress-bar-bg {
      height: 4px;
      background: var(--surface2);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-label {
      margin-top: 0.5rem;
      font-size: 0.72rem;
      color: var(--muted);
      text-align: left;
    }

    /* ===== MAIN ===== */
    main {
      position: relative;
      z-index: 10;
      max-width: 1280px;
      margin: 0 auto;
      padding: 0 2rem 4rem;
    }

    /* Stats strip */
    .stats-strip {
      display: none;
      align-items: stretch;
      border: 1.5px solid var(--ink);
      margin-bottom: 2rem;
      overflow: hidden;
    }

    .stat-item {
      flex: 1;
      padding: 1rem 1.5rem;
      border-right: 1.5px solid var(--ink);
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }

    .stat-item:last-child { border-right: none; }

    .stat-num {
      font-family: 'Unbounded', sans-serif;
      font-size: 2rem;
      font-weight: 900;
      line-height: 1;
      color: var(--accent);
    }

    .stat-label {
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .stat-item.root-name {
      background: var(--ink);
      flex: 2;
    }

    .stat-item.root-name .stat-num {
      color: var(--bg);
      font-size: 1rem;
      word-break: break-all;
    }

    .stat-item.root-name .stat-label { color: var(--muted); filter: invert(1); }

    /* Empty / No results */
    .msg-box {
      border: 1.5px solid var(--border2);
      padding: 3rem 2rem;
      text-align: center;
      background: var(--card-bg);
    }

    .msg-box .big-char {
      font-family: 'Unbounded', sans-serif;
      font-size: 3rem;
      font-weight: 900;
      color: var(--border2);
      display: block;
      margin-bottom: 0.75rem;
    }

    .msg-box h3 { font-family: 'Unbounded', sans-serif; font-size: 0.9rem; margin-bottom: 0.5rem; }
    .msg-box p { font-size: 0.75rem; color: var(--muted); line-height: 1.7; }

    /* ===== CARD GRID ===== */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .card {
      background: var(--card-bg);
      border: 1.5px solid var(--border2);
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(20px);
      animation: riseIn 0.45s cubic-bezier(0.22,1,0.36,1) forwards;
      transition: box-shadow 0.2s, transform 0.2s, border-color 0.2s;
      position: relative;
    }

    .card::after {
      content: '';
      position: absolute;
      bottom: -4px;
      right: -4px;
      width: 100%;
      height: 100%;
      border: 1.5px solid var(--ink);
      z-index: -1;
      transition: bottom 0.2s, right 0.2s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translate(-2px, -2px);
    }

    .card:hover::after {
      bottom: -6px;
      right: -6px;
      border-color: var(--accent);
    }

    @keyframes riseIn {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-num {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.6rem;
      font-weight: 900;
      color: var(--border);
      letter-spacing: 0.05em;
    }

    .card-header {
      padding: 1.25rem 1.5rem 0.75rem;
      border-bottom: 1px solid var(--surface2);
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
    }

    .card-index-icon {
      width: 36px;
      height: 36px;
      background: var(--ink);
      color: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Unbounded', sans-serif;
      font-size: 0.6rem;
      font-weight: 900;
      letter-spacing: 0;
      flex-shrink: 0;
      line-height: 1;
    }

    .card-title-wrap { flex: 1; min-width: 0; }

    .card-title {
      font-family: 'Unbounded', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
      word-break: break-word;
    }

    .card-path-label {
      margin-top: 0.25rem;
      font-size: 0.62rem;
      color: var(--muted);
      word-break: break-all;
    }

    .card-body {
      padding: 0.9rem 1.5rem;
      flex: 1;
    }

    .readme-label {
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .readme-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--surface2);
    }

    .card-desc {
      font-size: 0.76rem;
      line-height: 1.75;
      color: var(--ink2);
      display: -webkit-box;
      -webkit-line-clamp: 5;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .no-readme {
      font-size: 0.72rem;
      color: var(--muted);
      font-style: italic;
    }

    .card-footer {
      padding: 0.8rem 1.5rem;
      border-top: 1px solid var(--surface2);
      display: flex;
      gap: 0.6rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-open {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'Unbounded', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      padding: 0.5rem 1rem;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .btn-open:hover { background: #a93224; }

    .btn-folder {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: transparent;
      color: var(--ink2);
      border: 1.5px solid var(--border2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      padding: 0.45rem 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      text-decoration: none;
      flex-shrink: 0;
    }

    .btn-folder:hover { border-color: var(--ink); color: var(--ink); }

    /* File count badge */
    .file-badge {
      margin-left: auto;
      font-size: 0.6rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ===== SORT / FILTER ===== */
    .toolbar {
      display: none;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .toolbar-label {
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .filter-input {
      background: var(--card-bg);
      border: 1.5px solid var(--border2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.76rem;
      color: var(--ink);
      padding: 0.45rem 0.9rem;
      outline: none;
      flex: 1;
      min-width: 180px;
      max-width: 280px;
      transition: border-color 0.15s;
    }

    .filter-input:focus { border-color: var(--accent); }
    .filter-input::placeholder { color: var(--muted); }

    .sort-btn {
      background: transparent;
      border: 1.5px solid var(--border2);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.68rem;
      color: var(--ink2);
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }

    .sort-btn.active, .sort-btn:hover {
      border-color: var(--ink);
      background: var(--ink);
      color: var(--bg);
    }

    /* ===== FAVORITE BUTTON ===== */
    .fav-btn {
      position: absolute;
      top: 0.6rem;
      left: 0.75rem;
      width: 28px;
      height: 28px;
      background: none;
      border: 1.5px solid var(--border2);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      color: var(--muted);
      transition: border-color 0.15s, color 0.15s, background 0.15s, transform 0.12s;
      z-index: 2;
      padding: 0;
      line-height: 1;
    }
    .fav-btn:hover { border-color: var(--accent2); color: var(--accent2); transform: scale(1.15); }
    .fav-btn.active { border-color: var(--accent2); background: var(--accent2); color: #fff; }
    .fav-btn.pop { animation: favPop 0.3s cubic-bezier(0.36,0.07,0.19,0.97); }
    @keyframes favPop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.4); }
      70%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    /* ===== FAV FILTER TAB ===== */
    .view-tabs {
      display: none;
      gap: 0;
      margin-bottom: 1.5rem;
      border: 1.5px solid var(--ink);
      overflow: hidden;
      width: fit-content;
    }
    .view-tab {
      background: transparent;
      border: none;
      border-right: 1.5px solid var(--ink);
      font-family: 'Unbounded', sans-serif;
      font-weight: 700;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      color: var(--ink2);
      padding: 0.55rem 1.2rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .view-tab:last-child { border-right: none; }
    .view-tab.active { background: var(--ink); color: var(--bg); }
    .view-tab:not(.active):hover { background: var(--surface2); }
    .fav-count-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 18px;
      height: 18px;
      padding: 0 4px;
      border-radius: 2px;
      background: var(--accent2);
      color: #fff;
      font-size: 0.58rem;
      font-weight: 900;
      line-height: 1;
    }
    .view-tab.active .fav-count-badge { background: var(--accent2); }

    /* ===== TOAST ===== */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--ink);
      color: var(--bg);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      padding: 0.6rem 1.4rem;
      border-left: 3px solid var(--accent2);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 1000;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 600px) {
      .header-main { flex-direction: column; align-items: flex-start; }
      .stats-strip { flex-wrap: wrap; }
      .stat-item { min-width: 50%; border-bottom: 1.5px solid var(--ink); }
    }
  </style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-top">
    <span>LOCAL PORTAL EXPLORER v1.0</span>
    <span id="clock">--:--:--</span>
  </div>
  <div class="header-main">
    <div class="logo">
      <h1>LOCAL<br><span>PORTAL</span></h1>
      <p class="subtitle">// File System Site Explorer</p>
    </div>
    <span class="version-badge">⬡ OFFLINE MODE</span>
  </div>
</header>

<!-- DROP ZONE -->
<div class="drop-section">
  <div class="drop-zone" id="dropZone">
    <span class="drop-icon">▣</span>
    <h2>フォルダをドロップ</h2>
    <p>
      サイトが入ったルートフォルダをここにドラッグ＆ドロップ<br>
      各サブフォルダ内の <code>index.html</code> と <code>README.md</code> を自動検出します
    </p>
    <div class="drop-or">OR</div>
    <div class="file-btn-wrap">
      <button class="file-btn">
        ◈ フォルダを選択
      </button>
      <input type="file" id="folderInput" webkitdirectory multiple accept="">
    </div>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-label" id="progressLabel">スキャン準備中...</div>
  </div>
</div>

<!-- MAIN -->
<main>
  <div class="stats-strip" id="statsStrip">
    <div class="stat-item root-name">
      <span class="stat-label">ROOT FOLDER</span>
      <span class="stat-num" id="statRoot">—</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="statSites">0</span>
      <span class="stat-label">Sites Found</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="statFolders">0</span>
      <span class="stat-label">Folders Scanned</span>
    </div>
    <div class="stat-item">
      <span class="stat-num" id="statReadme">0</span>
      <span class="stat-label">READMEs Read</span>
    </div>
  </div>

  <div class="toolbar" id="toolbar">
    <span class="toolbar-label">絞り込み：</span>
    <input type="text" class="filter-input" id="filterInput" placeholder="フォルダ名 or 説明文で検索...">
    <span class="toolbar-label" style="margin-left:auto;">並べ替え：</span>
    <button class="sort-btn active" id="sortName" onclick="setSortMode('name')">NAME</button>
    <button class="sort-btn" id="sortModified" onclick="setSortMode('index')">INDEX</button>
  </div>

  <!-- View Tabs -->
  <div class="view-tabs" id="viewTabs">
    <button class="view-tab active" onclick="setViewMode('all')" id="tabAll">◈ ALL</button>
    <button class="view-tab" onclick="setViewMode('fav')" id="tabFav">★ FAVORITES <span class="fav-count-badge" id="favCountBadge">0</span></button>
  </div>

  <div id="noResults" class="msg-box" style="display:none;"></div>

  <div id="grid"></div>
</main>

<div id="toast"></div>

<script>
  // ===== TOAST =====
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ===== FAVORITES (localStorage) =====
  function getFavs() {
    try { return new Set(JSON.parse(localStorage.getItem('portal_favs') || '[]')); }
    catch { return new Set(); }
  }
  function saveFavs(set) {
    localStorage.setItem('portal_favs', JSON.stringify([...set]));
  }
  function toggleFav(name) {
    const favs = getFavs();
    const added = !favs.has(name);
    if (added) favs.add(name); else favs.delete(name);
    saveFavs(favs);
    updateFavCount();
    return added;
  }
  function updateFavCount() {
    const count = getFavs().size;
    document.getElementById('favCountBadge').textContent = count;
    // update all fav buttons currently rendered
    document.querySelectorAll('.fav-btn').forEach(btn => {
      const n = btn.dataset.name;
      btn.classList.toggle('active', getFavs().has(n));
      btn.title = getFavs().has(n) ? 'お気に入りから削除' : 'お気に入りに追加';
    });
    // if in fav view and no favs, re-render
    if (viewMode === 'fav' && count === 0) renderCards();
  }

  // ===== VIEW MODE =====
  let viewMode = 'all';
  function setViewMode(mode) {
    viewMode = mode;
    document.getElementById('tabAll').classList.toggle('active', mode === 'all');
    document.getElementById('tabFav').classList.toggle('active', mode === 'fav');
    renderCards();
  }

  // Clock
  function updateClock() {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP');
  }
  setInterval(updateClock, 1000);
  updateClock();

  // State
  let allSites = [];
  let sortMode = 'name';

  // ===== README 抽出 =====
  function extractDescription(md) {
    if (!md) return null;
    md = md.replace(/```[\s\S]*?```/g, '');
    md = md.replace(/<[^>]+>/g, '');
    md = md.replace(/\[!\[.*?\]\(.*?\)\]\(.*?\)/g, '');
    md = md.replace(/!\[.*?\]\(.*?\)/g, '');

    const lines = md.split('\n').map(l => l.trim()).filter(Boolean);
    let desc = '';
    let pastFirstHeading = false;

    for (const line of lines) {
      if (/^#{1,3}\s/.test(line)) {
        if (pastFirstHeading && desc) break;
        pastFirstHeading = true;
        continue;
      }
      if (/^[-*|>]/.test(line)) continue;
      if (/^\[.*\]:/.test(line)) continue;
      if (line.length < 12) continue;
      const cleaned = line
        .replace(/\*{1,2}([^*]+)\*{1,2}/g, '$1')
        .replace(/_([^_]+)_/g, '$1')
        .replace(/`([^`]+)`/g, '$1')
        .replace(/\[([^\]]+)\]\([^)]+\)/g, '$1');
      desc += (desc ? ' ' : '') + cleaned;
      if (desc.length > 320) break;
    }
    return desc || null;
  }

  // ===== ファイル一覧の解析 =====
  async function processFiles(fileList) {
    const files = Array.from(fileList);
    if (files.length === 0) return;

    // フォルダ名ごとにグループ化
    const folderMap = new Map(); // folderKey -> { name, depth1name, files[] }

    // ルートフォルダ名を取得（webkitRelativePath の先頭）
    const rootName = files[0].webkitRelativePath.split('/')[0];
    document.getElementById('statRoot').textContent = rootName;

    for (const file of files) {
      const parts = file.webkitRelativePath.split('/');
      // depth1: ルート直下のサブフォルダ only（depth == 2以上のファイルも含まれる）
      if (parts.length < 2) continue;
      const depth1 = parts[1]; // サブフォルダ名
      if (!depth1) continue;

      // depth1フォルダの直下のファイルだけ対象
      // （parts[0]=root, parts[1]=subdir, parts[2]=file）
      if (parts.length !== 3) continue;

      if (!folderMap.has(depth1)) {
        folderMap.set(depth1, { name: depth1, files: [], hasIndex: false, hasReadme: false, readmeFile: null });
      }
      const entry = folderMap.get(depth1);
      entry.files.push(file);

      const fname = parts[2].toLowerCase();
      if (fname === 'index.html') entry.hasIndex = true;
      if (fname === 'readme.md') { entry.hasReadme = true; entry.readmeFile = file; }
    }

    // Progress setup
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressLabel = document.getElementById('progressLabel');
    progressWrap.style.display = 'block';

    const dirs = [...folderMap.values()];
    const total = dirs.length;
    let scanned = 0;
    let sitesFound = 0;
    let readmeCount = 0;

    allSites = [];

    for (const dir of dirs) {
      scanned++;
      progressFill.style.width = ((scanned / total) * 100) + '%';
      progressLabel.textContent = `スキャン中: ${dir.name} (${scanned}/${total})`;

      if (!dir.hasIndex) continue;

      let desc = null;
      if (dir.hasReadme && dir.readmeFile) {
        try {
          const text = await dir.readmeFile.text();
          desc = extractDescription(text);
          readmeCount++;
        } catch(e) { desc = null; }
      }

      // index.html の File オブジェクトを探す
      const indexFile = dir.files.find(f => f.name.toLowerCase() === 'index.html');

      sitesFound++;
      allSites.push({
        name: dir.name,
        desc: desc,
        fileCount: dir.files.length,
        indexFile: indexFile,
        hasReadme: dir.hasReadme,
      });
    }

    progressLabel.textContent = `完了！ ${sitesFound} サイト検出 (${total} フォルダ中)`;

    document.getElementById('statSites').textContent = sitesFound;
    document.getElementById('statFolders').textContent = total;
    document.getElementById('statReadme').textContent = readmeCount;
    document.getElementById('statsStrip').style.display = 'flex';
    document.getElementById('toolbar').style.display = 'flex';
    document.getElementById('viewTabs').style.display = 'flex';
    updateFavCount();

    renderCards();

    // Filter
    document.getElementById('filterInput').addEventListener('input', renderCards);
  }

  // ===== SORT =====
  function setSortMode(mode) {
    sortMode = mode;
    document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(mode === 'name' ? 'sortName' : 'sortModified').classList.add('active');
    renderCards();
  }

  // ===== RENDER =====
  function renderCards() {
    const query = (document.getElementById('filterInput')?.value || '').toLowerCase();
    const grid = document.getElementById('grid');
    const noResults = document.getElementById('noResults');
    grid.innerHTML = '';

    const favs = getFavs();

    let sites = allSites.filter(s => {
      if (viewMode === 'fav' && !favs.has(s.name)) return false;
      if (!query) return true;
      return s.name.toLowerCase().includes(query) ||
        (s.desc && s.desc.toLowerCase().includes(query));
    });

    if (sortMode === 'name') {
      sites.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
    }

    if (sites.length === 0) {
      const isFavEmpty = viewMode === 'fav' && favs.size === 0;
      noResults.innerHTML = isFavEmpty
        ? `<span class="big-char">★</span><h3>お気に入りがありません</h3><p>カードの ★ ボタンでお気に入りに追加できます。</p>`
        : `<span class="big-char">∅</span><h3>サイトが見つかりませんでした</h3><p>index.html を含むサブフォルダが存在しません。<br>別のフォルダをお試しください。</p>`;
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';

    sites.forEach((site, i) => {
      const delay = Math.min(i * 50, 600) + 'ms';
      const card = document.createElement('div');
      card.className = 'card';
      card.style.animationDelay = delay;

      // index.html を blob URL で開く
      let openHref = '#';
      if (site.indexFile) {
        openHref = URL.createObjectURL(site.indexFile);
      }

      const numStr = String(i + 1).padStart(2, '0');
      const isFav = favs.has(site.name);

      card.innerHTML = `
        <button class="fav-btn${isFav ? ' active' : ''}" data-name="${escHtml(site.name)}" title="${isFav ? 'お気に入りから削除' : 'お気に入りに追加'}">★</button>
        <span class="card-num">#${numStr}</span>
        <div class="card-header">
          <div class="card-index-icon">.HTML</div>
          <div class="card-title-wrap">
            <div class="card-title">${escHtml(site.name)}</div>
            <div class="card-path-label">index.html${site.hasReadme ? ' · README.md' : ''}</div>
          </div>
        </div>
        <div class="card-body">
          ${site.desc
            ? `<div class="readme-label">README.md</div><div class="card-desc">${escHtml(site.desc)}</div>`
            : `<div class="no-readme">README.md が見つかりませんでした</div>`
          }
        </div>
        <div class="card-footer">
          <a class="btn-open" href="${openHref}" target="_blank" rel="noopener">
            ▶ OPEN SITE
          </a>
          <span class="file-badge">${site.fileCount} files</span>
        </div>
      `;

      // Fav button handler
      card.querySelector('.fav-btn').addEventListener('click', function(e) {
        e.stopPropagation();
        const name = this.dataset.name;
        const added = toggleFav(name);
        this.classList.add('pop');
        this.addEventListener('animationend', () => this.classList.remove('pop'), { once: true });
        showToast(added ? `★ "${name}" をお気に入りに追加` : `☆ "${name}" をお気に入りから削除`);
        if (viewMode === 'fav') {
          // remove card if unfaved in fav view
          if (!added) {
            card.style.transition = 'opacity 0.25s, transform 0.25s';
            card.style.opacity = '0';
            card.style.transform = 'scale(0.95)';
            setTimeout(() => { renderCards(); }, 260);
          }
        }
      });

      grid.appendChild(card);
    });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ===== INPUT HANDLER =====
  document.getElementById('folderInput').addEventListener('change', function() {
    if (this.files && this.files.length > 0) {
      processFiles(this.files);
    }
  });

  // ===== DRAG & DROP =====
  const dropZone = document.getElementById('dropZone');

  dropZone.addEventListener('dragover', e => {
    e.preventDefault();
    dropZone.classList.add('drag-over');
  });

  dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('drag-over');
  });

  dropZone.addEventListener('drop', async e => {
    e.preventDefault();
    dropZone.classList.remove('drag-over');

    const items = e.dataTransfer.items;
    if (!items) return;

    // DataTransferItemList から FileEntry を取得
    const allFiles = [];

    async function traverseEntry(entry, path) {
      return new Promise(resolve => {
        if (entry.isFile) {
          entry.file(file => {
            // webkitRelativePath を手動セット
            Object.defineProperty(file, 'webkitRelativePath', {
              value: path + file.name,
              writable: false
            });
            allFiles.push(file);
            resolve();
          });
        } else if (entry.isDirectory) {
          const reader = entry.createReader();
          const readAll = (acc) => {
            reader.readEntries(async entries => {
              if (entries.length === 0) {
                const promises = acc.map(e => traverseEntry(e, path + entry.name + '/'));
                await Promise.all(promises);
                resolve();
              } else {
                readAll([...acc, ...entries]);
              }
            });
          };
          readAll([]);
        } else {
          resolve();
        }
      });
    }

    const promises = [];
    for (const item of items) {
      if (item.kind === 'file') {
        const entry = item.webkitGetAsEntry?.();
        if (entry) promises.push(traverseEntry(entry, ''));
      }
    }
    await Promise.all(promises);

    // webkitRelativePath を再構成（drop時はroot名が異なる場合がある）
    // ルート名を統一してprocessFilesに渡す
    const rootEntry = items[0]?.webkitGetAsEntry?.();
    if (rootEntry && rootEntry.isDirectory) {
      // allFiles の先頭に root name を付与
      const rootName = rootEntry.name;
      const remapped = allFiles.map(file => {
        const rel = file.webkitRelativePath;
        // すでに rootName/ で始まっていれば OK
        const newRel = rel.startsWith(rootName + '/') ? rel : rootName + '/' + rel;
        Object.defineProperty(file, 'webkitRelativePath', {
          value: newRel,
          writable: false,
          configurable: true
        });
        return file;
      });
      await processFiles(remapped);
    } else {
      await processFiles(allFiles);
    }
  });
</script>
</body>
