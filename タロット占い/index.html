<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘のタロット占い</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Tarot Reading</h1>
        
        <div class="controls">
            <label for="mode-select">占いモードを選択：</label>
            <select id="mode-select">
                <option value="1">ワンオラクル（1枚引き - 今日の運勢）</option>
                <option value="3">スプレッド鑑定（3枚引き - 過去・現在・未来）</option>
            </select>
            <button id="draw-btn">カードを引く</button>
        </div>

        <div id="card-container" class="card-container">
            </div>

        <div id="result-container" class="result-container">
            </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
