<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GitHub Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #7c6dfa;
      --accent2: #fa6d8d;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --card-bg: #13131c;
      --glow: rgba(124, 109, 250, 0.15);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,109,250,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,109,250,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Header */
    header {
      position: relative;
      z-index: 10;
      padding: 3rem 2rem 2rem;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(to bottom, rgba(124,109,250,0.08), transparent);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .logo-area h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-area p {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    /* Config form */
    .config-bar {
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
      flex-wrap: wrap;
    }

    .config-bar input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      padding: 0.6rem 1rem;
      border-radius: 6px;
      outline: none;
      width: 300px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .config-bar input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .config-bar input::placeholder { color: var(--muted); }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      padding: 0.6rem 1.4rem;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn:hover { opacity: 0.85; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Status bar */
    .status-bar {
      position: relative;
      z-index: 10;
      max-width: 1200px;
      margin: 1.5rem auto 0;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      font-size: 0.78rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .repo-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.25rem 0.75rem;
      font-size: 0.75rem;
      color: var(--accent);
    }

    .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Main */
    main {
      position: relative;
      z-index: 10;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Loading */
    #loading {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 6rem 0;
      gap: 1.5rem;
    }

    .spinner {
      width: 40px; height: 40px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Empty / Error */
    .message-box {
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 4rem 2rem;
      text-align: center;
      color: var(--muted);
    }

    .message-box .icon { font-size: 2.5rem; margin-bottom: 1rem; }
    .message-box h3 { font-family: 'Syne', sans-serif; color: var(--text); margin-bottom: 0.5rem; }

    /* Grid */
    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }

    /* Card */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.5s ease forwards;
      transition: border-color 0.25s, box-shadow 0.25s, transform 0.25s;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 32px var(--glow), 0 8px 32px rgba(0,0,0,0.4);
      transform: translateY(-4px);
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      padding: 1.25rem 1.5rem 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .card-icon {
      width: 40px; height: 40px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }

    .card-tag {
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(124,109,250,0.1);
      border: 1px solid rgba(124,109,250,0.2);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }

    .card-body {
      padding: 1rem 1.5rem;
      flex: 1;
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
      word-break: break-word;
    }

    .card-desc {
      font-size: 0.78rem;
      line-height: 1.7;
      color: var(--muted);
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.72rem;
      color: var(--muted);
    }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-weight: 600;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      text-decoration: none;
      transition: gap 0.2s;
    }

    .card-link:hover { gap: 0.6rem; }

    .card-path {
      font-size: 0.68rem;
      color: var(--muted);
      opacity: 0.6;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 60%;
    }

    /* Stats row */
    .stats-row {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 0.1rem;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.1em; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo-area">
      <h1>PORTAL</h1>
      <p>// GITHUB REPOSITORY EXPLORER</p>
    </div>
    <div class="config-bar">
      <input type="text" id="repoInput" placeholder="owner/repo (例: torvalds/linux)" value="amesrius/Portal">
      <button class="btn" id="loadBtn" onclick="loadRepo()">SCAN →</button>
    </div>
  </div>
</header>

<div class="status-bar" id="statusBar" style="display:none;">
  <span class="repo-badge"><span class="dot"></span><span id="repoName">—</span></span>
  <span id="statusText">読み込み中...</span>
</div>

<main>
  <div id="loading">
    <div class="spinner"></div>
    <span style="color: var(--muted); font-size:0.8rem; letter-spacing:0.1em;">SCANNING REPOSITORY...</span>
  </div>

  <div id="empty" class="message-box">
    <div class="icon">◈</div>
    <h3>リポジトリを指定してください</h3>
    <p style="font-size:0.8rem; margin-top:0.5rem;">
      上部の入力欄に <code style="color:var(--accent)">owner/repo</code> 形式で入力し、SCANを押してください。<br>
      同リポジトリ内の各フォルダの README.md と index.html を自動検出します。
    </p>
  </div>

  <div id="error" class="message-box" style="display:none;">
    <div class="icon">⚠</div>
    <h3>エラーが発生しました</h3>
    <p id="errorMsg" style="font-size:0.8rem; margin-top:0.5rem;"></p>
  </div>

  <div id="results" style="display:none;">
    <div class="stats-row">
      <div class="stat">
        <span class="stat-num" id="statCount">0</span>
        <span class="stat-label">SITES FOUND</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="statFolders">0</span>
        <span class="stat-label">FOLDERS SCANNED</span>
      </div>
    </div>
    <div id="grid"></div>
  </div>
</main>

<script>
  // カード用アイコン（ランダム選択）
  const icons = ['◈','◉','◎','⬡','⬢','◆','▣','⊞','⊟','⬟'];
  const colors = [
    ['#7c6dfa','#fa6d8d'],
    ['#6dfac7','#6db0fa'],
    ['#fac76d','#fa6dce'],
    ['#6dfaaa','#fa9b6d'],
    ['#b06dfa','#6dfae8'],
  ];

  // README.md からメインの紹介文を抽出
  function extractDescription(md) {
    if (!md) return '説明文が見つかりませんでした。';

    // コードブロック除去
    md = md.replace(/```[\s\S]*?```/g, '');
    // HTMLタグ除去
    md = md.replace(/<[^>]+>/g, '');
    // バッジ行除去
    md = md.replace(/\[!\[.*?\]\(.*?\)\]\(.*?\)/g, '');
    md = md.replace(/!\[.*?\]\(.*?\)/g, '');

    const lines = md.split('\n').map(l => l.trim()).filter(Boolean);

    // 最初の見出しをスキップして本文テキストを探す
    let desc = '';
    let foundHeading = false;

    for (const line of lines) {
      if (/^#{1,3}\s/.test(line)) {
        if (foundHeading && desc) break; // 次の見出しで終了
        foundHeading = true;
        continue;
      }
      if (/^[-*|>]/.test(line)) continue;  // リスト・引用・テーブルスキップ
      if (/^\[.*\]:/.test(line)) continue;  // リンク定義スキップ
      if (line.length < 15) continue;       // 短すぎる行スキップ

      desc += (desc ? ' ' : '') + line.replace(/\*{1,2}([^*]+)\*{1,2}/g, '$1').replace(/`([^`]+)`/g, '$1');
      if (desc.length > 300) break;
    }

    return desc || '（README.md に説明文がありません）';
  }

  // GitHub API でディレクトリ内容を取得
  async function fetchContents(owner, repo, path = '') {
    const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
    const res = await fetch(url, {
      headers: { 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!res.ok) throw new Error(`GitHub API エラー: ${res.status} ${res.statusText}`);
    return res.json();
  }

  // ファイル内容を取得（base64デコード）
  async function fetchFile(owner, repo, path) {
    try {
      const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;
      const res = await fetch(url, {
        headers: { 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!res.ok) return null;
      const data = await res.json();
      if (data.content) {
        return atob(data.content.replace(/\n/g, ''));
      }
      return null;
    } catch { return null; }
  }

  let scannedFolders = 0;

  function setStatus(text) {
    document.getElementById('statusText').textContent = text;
  }

  async function loadRepo() {
    const input = document.getElementById('repoInput').value.trim();
    if (!input) { alert('リポジトリを入力してください (例: owner/repo)'); return; }

    const parts = input.split('/').filter(Boolean);
    if (parts.length < 2) { alert('owner/repo の形式で入力してください'); return; }

    const owner = parts[0];
    const repo = parts[1];

    // UI リセット
    document.getElementById('empty').style.display = 'none';
    document.getElementById('error').style.display = 'none';
    document.getElementById('results').style.display = 'none';
    document.getElementById('loading').style.display = 'flex';
    document.getElementById('statusBar').style.display = 'flex';
    document.getElementById('repoName').textContent = `${owner}/${repo}`;
    document.getElementById('loadBtn').disabled = true;
    document.getElementById('grid').innerHTML = '';
    scannedFolders = 0;

    try {
      setStatus('ルートディレクトリをスキャン中...');
      const rootContents = await fetchContents(owner, repo);

      // トップレベルのフォルダを取得
      const dirs = rootContents.filter(item => item.type === 'dir' && !item.name.startsWith('.'));

      setStatus(`${dirs.length} フォルダを検出。index.html を探しています...`);

      const sites = [];
      const baseUrl = `https://${owner}.github.io/${repo}`;
      // GitHub Pages URL or raw GitHub URL
      const rawBase = `https://raw.githubusercontent.com/${owner}/${repo}/HEAD`;

      // 並列処理（max 5並列）
      const CONCURRENT = 5;
      for (let i = 0; i < dirs.length; i += CONCURRENT) {
        const batch = dirs.slice(i, i + CONCURRENT);
        const results = await Promise.all(batch.map(async (dir) => {
          scannedFolders++;
          setStatus(`スキャン中: ${dir.name} (${scannedFolders}/${dirs.length})`);

          try {
            const contents = await fetchContents(owner, repo, dir.name);
            const fileNames = contents.map(f => f.name.toLowerCase());

            const hasIndex = fileNames.includes('index.html');
            const hasReadme = fileNames.includes('readme.md');

            if (!hasIndex) return null; // index.html がなければスキップ

            let desc = '';
            if (hasReadme) {
              const mdContent = await fetchFile(owner, repo, `${dir.name}/README.md`);
              desc = extractDescription(mdContent);
            }

            return {
              name: dir.name,
              desc: desc || '（README.md がありません）',
              path: dir.path,
              indexUrl: `${baseUrl}/${dir.name}/`,
              rawIndexUrl: `https://github.com/${owner}/${repo}/blob/main/${dir.name}/index.html`,
            };
          } catch { return null; }
        }));

        results.filter(Boolean).forEach(site => sites.push(site));
        // 見つかったカードをリアルタイム表示
        renderCards(sites, dirs.length);
      }

      document.getElementById('statCount').textContent = sites.length;
      document.getElementById('statFolders').textContent = dirs.length;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('results').style.display = 'block';

      if (sites.length === 0) {
        setStatus('index.html を含むフォルダが見つかりませんでした');
      } else {
        setStatus(`${sites.length} サイトを検出しました ✓`);
      }

    } catch (err) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
      document.getElementById('errorMsg').textContent = err.message;
      setStatus('エラー');
      console.error(err);
    } finally {
      document.getElementById('loadBtn').disabled = false;
    }
  }

  function renderCards(sites, totalDirs) {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    document.getElementById('results').style.display = 'block';
    document.getElementById('statCount').textContent = sites.length;
    document.getElementById('statFolders').textContent = totalDirs;

    sites.forEach((site, i) => {
      const icon = icons[i % icons.length];
      const [c1, c2] = colors[i % colors.length];
      const delay = (i * 60) + 'ms';

      const card = document.createElement('a');
      card.className = 'card';
      card.href = site.indexUrl;
      card.target = '_blank';
      card.rel = 'noopener noreferrer';
      card.style.animationDelay = delay;
      card.innerHTML = `
        <div class="card-header">
          <div class="card-icon" style="background: linear-gradient(135deg, ${c1}, ${c2})">${icon}</div>
          <span class="card-tag">SITE</span>
        </div>
        <div class="card-body">
          <div class="card-title">${escHtml(site.name)}</div>
          <div class="card-desc">${escHtml(site.desc)}</div>
        </div>
        <div class="card-footer">
          <span class="card-path">/${escHtml(site.path)}/</span>
          <span class="card-link">
            OPEN
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 10L10 2M10 2H4M10 2V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </span>
        </div>
      `;

      // カードクリックでindex.htmlへ（aタグなので自動だが念のため）
      grid.appendChild(card);
    });
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Enter キーで検索
  document.getElementById('repoInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') loadRepo();
  });

  // ページ読み込み時に自動スキャン
  window.addEventListener('DOMContentLoaded', () => loadRepo());
</script>
</body>
</html>
