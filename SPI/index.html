<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SPI非言語 計算ツール集</title>
<style>
  :root {
    --ink: #1c1f26;
    --ink-soft: #565d6b;
    --ink-faint: #8b929e;
    --paper: #f6f5f1;
    --panel: #ffffff;
    --line: #e4e2db;
    --line-strong: #cfccc2;
    --accent: #2f5d50;
    --accent-soft: #e7efec;
    --accent-ink: #1f4038;
    --warn: #a6512c;
    --radius: 10px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--paper);
    color: var(--ink);
    font-family: "Hiragino Sans", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
  }

  body {
    padding-bottom: calc(72px + var(--safe-bottom));
  }

  /* ---------- Header ---------- */
  .app-header {
    position: sticky;
    top: 0;
    z-index: 20;
    background: var(--paper);
    padding: calc(14px + var(--safe-top)) 16px 10px;
    border-bottom: 1px solid var(--line);
  }
  .app-header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    font-weight: 700;
    text-transform: uppercase;
  }
  .app-header h1 {
    margin: 3px 0 0;
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .app-header .sub {
    margin: 2px 0 0;
    font-size: 12px;
    color: var(--ink-faint);
  }

  /* ---------- Category strip (top-level grouping) ---------- */
  .cat-strip {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 16px 0;
    scrollbar-width: none;
  }
  .cat-strip::-webkit-scrollbar { display: none; }
  .cat-chip {
    flex-shrink: 0;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 999px;
    border: 1px solid var(--line-strong);
    background: var(--panel);
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .cat-chip.active {
    background: var(--ink);
    border-color: var(--ink);
    color: var(--paper);
    font-weight: 600;
  }

  /* ---------- Unit tab strip (within category) ---------- */
  .unit-strip {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 16px 12px;
    scrollbar-width: none;
  }
  .unit-strip::-webkit-scrollbar { display: none; }
  .unit-chip {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12.5px;
    padding: 7px 12px;
    border-radius: 8px;
    border: 1px solid var(--line);
    background: var(--panel);
    color: var(--ink-soft);
    white-space: nowrap;
  }
  .unit-chip.active {
    background: var(--accent-soft);
    border-color: var(--accent);
    color: var(--accent-ink);
    font-weight: 600;
  }
  .unit-chip .num {
    font-size: 10px;
    color: var(--ink-faint);
    font-variant-numeric: tabular-nums;
  }
  .unit-chip.active .num { color: var(--accent); }

  /* ---------- Main content ---------- */
  main {
    padding: 4px 16px 24px;
  }

  .panel {
    display: none;
  }
  .panel.active {
    display: block;
    animation: fadeIn 0.15s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px 16px 14px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 14.5px;
    font-weight: 700;
    margin: 0 0 3px;
    display: flex;
    align-items: baseline;
    gap: 6px;
  }
  .card-hint {
    font-size: 12px;
    color: var(--ink-faint);
    margin: 0 0 12px;
    line-height: 1.5;
  }

  .field-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 10px;
  }
  .field-row label {
    flex: 1 1 auto;
    font-size: 12.5px;
    color: var(--ink-soft);
    line-height: 1.35;
    min-width: 0;
  }
  .field-row .inputs {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  input[type="number"], input[type="text"] {
    font-family: inherit;
    font-size: 15px;
    padding: 8px 9px;
    border: 1px solid var(--line-strong);
    border-radius: 7px;
    background: var(--paper);
    color: var(--ink);
    width: 84px;
    min-width: 0;
    -moz-appearance: textfield;
  }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
  }
  input.wide { width: 100%; }
  input:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  select {
    font-family: inherit;
    font-size: 13px;
    padding: 8px 8px;
    border: 1px solid var(--line-strong);
    border-radius: 7px;
    background: var(--paper);
    color: var(--ink);
  }
  select:focus { outline: none; border-color: var(--accent); }

  .unit-label {
    font-size: 12.5px;
    color: var(--ink-faint);
    flex-shrink: 0;
    min-width: 30px;
  }

  .radio-row {
    display: flex;
    gap: 14px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .radio-opt {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12.5px;
    color: var(--ink-soft);
  }
  .radio-opt input { width: auto; }

  .out-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 10px;
    padding-top: 9px;
    margin-top: 3px;
    border-top: 1px solid var(--line);
  }
  .out-row:first-of-type { margin-top: 6px; }
  .out-row .out-label {
    font-size: 12.5px;
    color: var(--ink-soft);
    flex: 1;
  }
  .out-row .out-val {
    font-size: 16px;
    font-weight: 700;
    text-align: right;
    color: var(--accent-ink);
    font-variant-numeric: tabular-nums;
    word-break: break-word;
  }
  .out-row .out-val.small { font-size: 13px; font-weight: 500; color: var(--ink); white-space: pre-wrap; text-align: right; }

  .divider-hint {
    font-size: 11.5px;
    color: var(--ink-faint);
    margin: 10px 2px 0;
    line-height: 1.5;
  }

  /* formula list */
  .formula-row {
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
  }
  .formula-row:last-child { border-bottom: none; }
  .formula-name {
    font-size: 12px;
    color: var(--ink-faint);
    font-weight: 600;
  }
  .formula-eq {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
  }

  /* ---------- Bottom nav (main sections) ---------- */
  .bottom-nav {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 30;
    background: rgba(246,245,241,0.94);
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--line);
    padding: 6px 8px calc(6px + var(--safe-bottom));
  }
  .bottom-nav .scroller {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .bottom-nav .scroller::-webkit-scrollbar { display: none; }
  .nav-btn {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    padding: 6px 10px;
    border-radius: 8px;
    font-size: 10px;
    color: var(--ink-faint);
    background: transparent;
    border: none;
    white-space: nowrap;
    min-width: 54px;
  }
  .nav-btn.active {
    color: var(--accent-ink);
    background: var(--accent-soft);
    font-weight: 700;
  }
  .nav-btn .glyph {
    font-size: 15px;
    line-height: 1;
  }

  ::selection { background: var(--accent-soft); }
</style>
</head>
<body>

<header class="app-header">
  <div class="eyebrow">SPI NON-VERBAL TOOLKIT</div>
  <h1>SPI非言語 計算ツール集</h1>
  <p class="sub">10単元 + 公式集・C/P電卓・分数計算</p>
</header>

<div class="unit-strip" id="unitStrip"></div>

<main id="mainContent"></main>

<nav class="bottom-nav">
  <div class="scroller" id="bottomNav"></div>
</nav>

<script src="app.js"></script>
</body>
</html>
