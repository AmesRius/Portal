<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DB Site Generator - カスタムデザイン版</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>DB Site Generator</h1>
    <p>CSVデータを組み込み、デザインをカスタマイズしたデータベースサイトを生成します</p>
  </header>

  <main class="container">
    <section class="builder-panel">
      <h2>1. CSVファイルをアップロード</h2>
      <div class="csv-upload-box">
        <input type="file" id="csvFileInput" accept=".csv">
        <p class="hint">※1行目が項目名（ヘッダー）になっているCSVを選択</p>
      </div>

      <div id="fields-container">
        </div>

      <h2>2. サイト・デザイン設定</h2>
      <div class="site-settings">
        <label>サイトのタイトル: <input type="text" id="site-title" value="マイデータベース"></label>
        
        <div class="color-controls">
          <label>メインカラー (ヘッダー等): <input type="color" id="color-primary" value="#3498db"></label>
          <label>背景色: <input type="color" id="color-bg" value="#f4f7f6"></label>
          <label>文字色: <input type="color" id="color-text" value="#333333"></label>
        </div>
      </div>

      <button id="generate-btn" class="btn primary" disabled>コードを生成する (CSVを選択してください)</button>
    </section>

    <section class="output-panel">
      <h2>デザインプレビュー</h2>
      <div id="preview-window" class="preview-box">
        <h3 id="preview-title">マイデータベース</h3>
        <div class="preview-toolbar">
          <div class="preview-input">検索...</div>
        </div>
        <table class="preview-table">
          <thead>
            <tr><th>項目A ↕️</th><th>項目B ↕️</th></tr>
          </thead>
          <tbody>
            <tr><td>サンプルデータ</td><td>サンプルデータ</td></tr>
            <tr><td>サンプルデータ</td><td>サンプルデータ</td></tr>
          </tbody>
        </table>
      </div>

      <h2>3. 生成されたコード</h2>
      <textarea id="output-code" readonly placeholder="設定を完了し「コードを生成する」を押してください..."></textarea>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
